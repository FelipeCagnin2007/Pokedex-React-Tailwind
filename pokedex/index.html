<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>The Pokemon Atlas | A Enciclopédia Pokémon Completa & Batalhas Online</title>
    <meta name="description" content="The Pokemon Atlas: o compêndio definitivo com mais de 1008 Pokémon, dados detalhados de golpes (moves), itens, estatísticas, regiões e batalhas PvP online. Tudo em tempo real!" />
    <meta name="keywords" content="pokemon atlas, pokédex, pokemon, pokeapi, batalha pokemon, pvp pokemon, stats pokemon, the pokemon atlas" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://pokedex.app/" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="The Pokemon Atlas | A Enciclopédia Pokémon Completa" />
    <meta property="og:description" content="Explore o mundo Pokémon com o Atlas definitivo. Mais de 1008 criaturas, stats, batalhas PvP online e muito mais!" />
    <meta property="og:url"         content="https://pokedex.app/" />
    <meta property="og:image"       content="https://pokedex.app/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale"      content="pt_BR" />
    <meta property="og:site_name"   content="The Pokemon Atlas" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="The Pokemon Atlas | A Enciclopédia Pokémon Completa" />
    <meta name="twitter:description" content="Explore o mundo Pokémon com o Atlas definitivo. Mais de 1008 criaturas, stats e batalhas PvP online." />
    <meta name="twitter:image"       content="https://pokedex.app/og-image.png" />

    <!-- Theme & PWA -->
    <meta name="theme-color" content="#F8FAFC" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0F172A"  media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/pokeball.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Fonts — preconnect first -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Schema.org WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "The Pokemon Atlas",
      "url": "https://pokemonatlas.app/",
      "description": "O Atlas definitivo de Pokémon. Explore 1008+ criaturas, batalhas online, items e stats completos.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://pokedex.app/pokemon?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
